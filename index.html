<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0f2027, #203a43, #000000);
    font-family: Arial, sans-serif;
}

#playBtn {
    padding: 18px 40px;
    font-size: 22px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #00f260, #0575e6);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    transition: all 0.2s ease;
    letter-spacing: 2px;
}

#playBtn:hover {
    box-shadow: 0 0 35px rgba(0, 255, 255, 1);
    transform: scale(1.08);
}

#playBtn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<button id="playBtn">PLAY SOUND</button>
<audio id="audio" src="./faaa.mp3"></audio>

<script>
document.getElementById("playBtn").addEventListener("click", function() {
    document.getElementById("audio").play().catch(function(error) {
        alert("Audio play failed: " + error);
    });
});
</script>

</body>
</html>
