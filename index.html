<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0f2027, #203a43, #000000);
    font-family: 'Arial', sans-serif;
}

.container {
    text-align: center;
}

#playBtn {
    padding: 18px 40px;
    font-size: 22px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #00f260, #0575e6);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
}

#playBtn:hover {
    box-shadow: 0 0 35px rgba(0, 255, 255, 1);
    transform: scale(1.08);
}

#playBtn:active {
    transform: scale(0.95);
}

.gaming-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://i.imgur.com/3ZQ3Z3F.jpg') center/cover no-repeat;
    opacity: 0.25;
}
</style>
</head>
<body>

<div class="gaming-bg"></div>

<div class="container">
    <button id="playBtn">PLAY SOUND</button>
    <audio id="audio" src="./faaa.mp3"></audio>
</div>

<script>
document.getElementById("playBtn").addEventListener("click", function() {
    document.getElementById("audio").play();
});
</script>

</body>
</html>
