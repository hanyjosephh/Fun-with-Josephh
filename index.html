<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0f2027, #203a43, #000000);
    font-family: Arial, sans-serif;
    color: white;
}

/* Name at top */
#name {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
}

/* Round red gaming pad button */
#playBtn {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at top, #ff5252, #b30000);
    color: white;
    font-size: 24px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(255, 0, 0, 0.6);
    transition: all 0.2s ease;
}

#playBtn:hover {
    box-shadow: 0 15px 35px rgba(255, 0, 0, 0.9);
    transform: scale(1.08);
}

#playBtn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<div id="name">HanyJosephh</div>

<button id="playBtn">PRESS</button>
<audio id="audio" src="./faaa.mp3"></audio>

<script>
document.getElementById("playBtn").addEventListener("click", function() {
    document.getElementById("audio").play().catch(function(error) {
        alert("Audio play failed: " + error);
    });
});
</script>

</body>
</html>
