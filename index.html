<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #141e30, #243b55);
    font-family: Arial, sans-serif;
}

/* Button styling (MyInstants / prank style) */
#jobBtn {
    padding: 20px 50px;
    font-size: 24px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 198, 255, 0.8);
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
}

#jobBtn:hover {
    box-shadow: 0 0 40px rgba(0, 198, 255, 1);
    transform: scale(1.08);
}

#jobBtn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<!-- Button renamed to JOB -->
<button id="jobBtn">MY JOB</button>

<!-- Sound file -->
<audio id="audio" src="./faaa.mp3"></audio>

<script>
document.getElementById("jobBtn").addEventListener("click", function() {
    document.getElementById("audio").play().catch(function(error) {
        alert("Audio play failed: " + error);
    });
});
</script>

</body>
</html>
