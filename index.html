<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    background: radial-gradient(circle, #0f2027, #203a43, #000000);
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    padding: 20px 0;
}

/* Large top text */
#topText {
    font-size: 40px;
    font-weight: bold;
    text-transform: uppercase;
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
}

/* Gaming round red button */
#playBtn {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at top, #ff5252, #b30000);
    color: white;
    font-size: 26px;
    font-weight: bold;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(255, 0, 0, 0.6);
    transition: all 0.2s ease;
}

#playBtn:hover {
    box-shadow: 0 15px 35px rgba(255, 0, 0, 0.9);
    transform: scale(1.08);
}

#playBtn:active {
    transform: scale(0.95);
}

/* Creator text */
#creator {
    font-size: 18px;
    opacity: 0.9;
    letter-spacing: 1px;
}
</style>
</head>
<body>

<div id="topText">What Orange did to us?</div>

<button id="playBtn">PRESS</button>
<audio id="audio" src="./faaa.mp3"></audio>

<div id="creator">Created by: Hany Josephh</div>

<script>
document.getElementById("playBtn").addEventListener("click", function() {
    document.getElementById("audio").play().catch(function(error) {
        alert("Audio play failed: " + error);
    });
});
</script>

</body>
</html>
