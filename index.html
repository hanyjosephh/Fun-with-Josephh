<!DOCTYPE html>
<html>
<head>
<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #0f2027, #203a43, #000000);
    font-family: Arial, sans-serif;
    color: white;
}

/* Name at top */
#name {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 40px;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
}

/* Gaming / prank style button */
#playBtn {
    padding: 20px 55px;
    font-size: 24px;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(0, 198, 255, 0.8);
    transition: all 0.2s ease;
    text-transform: uppercase;
    letter-spacing: 2px;
}

#playBtn:hover {
    box-shadow: 0 0 40px rgba(0, 198, 255, 1);
    transform: scale(1.08);
}

#playBtn:active {
    transform: scale(0.95);
}
</style>
</head>
<body>

<div id="name">HanyJosephh</div>

<button id="playBtn">PLAY SOUND</button>
<audio id="audio" src="./faaa.mp3"></audio>

<script>
document.getElementById("playBtn").addEventListener("click", function() {
    document.getElementById("audio").play().catch(function(error) {
        alert("Audio play failed: " + error);
    });
});
</script>

</body>
</html>
